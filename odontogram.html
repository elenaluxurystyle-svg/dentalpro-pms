<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odontograma — DentalPro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:#1e293b;padding:16px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155}
.title{font-size:18px;font-weight:700;color:#38bdf8}
.back{padding:6px 14px;background:#334155;border:none;color:#e2e8f0;border-radius:8px;cursor:pointer;font-size:13px}
.content{padding:24px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8}
.legend-dot{width:14px;height:14px;border-radius:3px}
.odontogram{background:#1e293b;border-radius:16px;padding:24px;border:1px solid #334155}
.jaw-label{font-size:12px;color:#64748b;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.jaw{display:flex;justify-content:center;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.tooth{display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:2px}
.tooth-num{font-size:9px;color:#64748b}
.tooth-svg{transition:transform .1s}
.tooth:hover .tooth-svg{transform:scale(1.1)}
.divider{width:100%;height:1px;background:#334155;margin:16px 0}
.panel{background:#0f172a;border-radius:12px;padding:16px;margin-top:24px;border:1px solid #334155}
.panel h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#cbd5e1}
.conditions{display:flex;flex-wrap:wrap;gap:8px}
.selected-tooth{font-size:13px;color:#94a3b8;margin-bottom:12px}
.cond-btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600}
</style>
</head>
<body>
<div class="header">
  <button class="back" onclick="location.href='index.html'">← Volver</button>
  <span style="font-size:20px">🦷</span>
  <span class="title">Odontograma FDI</span>
  <span id="patient-name" style="margin-left:auto;font-size:13px;color:#64748b"></span>
</div>
<div class="content">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#1e293b;border:2px solid #475569"></div>Sano</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Corona</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Caries</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Extracción</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>Endodoncia</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Obturación</div>
    <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Implante</div>
  </div>
  <div class="odontogram">
    <div class="jaw-label">Superior Derecho — Superior Izquierdo</div>
    <div class="jaw" id="upper-jaw"></div>
    <div class="divider"></div>
    <div class="jaw" id="lower-jaw"></div>
    <div class="jaw-label" style="margin-top:8px">Inferior Derecho — Inferior Izquierdo</div>
  </div>
  <div class="panel">
    <div class="selected-tooth" id="selected-info">Haz click en un diente para seleccionarlo</div>
    <div class="conditions" id="conditions-panel" style="display:none">
      <button class="cond-btn" style="background:#1e293b;color:#94a3b8;border:1px solid #475569" onclick="setCondition('healthy')">⬜ Sano</button>
      <button class="cond-btn" style="background:#1d4ed8;color:white" onclick="setCondition('crown')">👑 Corona</button>
      <button class="cond-btn" style="background:#b45309;color:white" onclick="setCondition('caries')">🟡 Caries</button>
      <button class="cond-btn" style="background:#dc2626;color:white" onclick="setCondition('extraction')">❌ Extracción</button>
      <button class="cond-btn" style="background:#7c3aed;color:white" onclick="setCondition('endo')">🔴 Endodoncia</button>
      <button class="cond-btn" style="background:#059669;color:white" onclick="setCondition('filling')">🟢 Obturación</button>
      <button class="cond-btn" style="background:#0891b2;color:white" onclick="setCondition('implant')">🔵 Implante</button>
    </div>
  </div>
</div>
<script>
const COLORS={healthy:'#1e293b',crown:'#3b82f6',caries:'#f59e0b',extraction:'#ef4444',endo:'#8b5cf6',filling:'#10b981',implant:'#06b6d4'};
const STROKE={healthy:'#475569',crown:'#60a5fa',caries:'#fbbf24',extraction:'#fca5a5',endo:'#c4b5fd',filling:'#6ee7b7',implant:'#67e8f9'};
const upperRight=[18,17,16,15,14,13,12,11];
const upperLeft=[21,22,23,24,25,26,27,28];
const lowerRight=[48,47,46,45,44,43,42,41];
const lowerLeft=[31,32,33,34,35,36,37,38];
let teethState={};
let selectedTooth=null;

function toothSVG(num){
  const state=teethState[num]||'healthy';
  const fill=COLORS[state];
  const stroke=STROKE[state];
  const isMolar=[6,7,8,16,17,18,26,27,28,36,37,38,46,47,48].includes(num);
  const w=isMolar?28:22;
  return `<svg class="tooth-svg" width="${w}" height="40" viewBox="0 0 ${w} 40">
    <rect x="2" y="2" width="${w-4}" height="24" rx="4" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
    <rect x="${w/2-2}" y="26" width="4" height="12" rx="2" fill="${stroke}" opacity="0.6"/>
    ${state==='extraction'?`<line x1="4" y1="4" x2="${w-4}" y2="22" stroke="#ef4444" stroke-width="2"/><line x1="${w-4}" y1="4" x2="4" y2="22" stroke="#ef4444" stroke-width="2"/>`:''}
  </svg>`;
}

function renderJaw(teeth,containerId){
  const container=document.getElementById(containerId);
  container.innerHTML=teeth.map(num=>`
    <div class="tooth" onclick="selectTooth(${num})">
      <div class="tooth-num">${num}</div>
      <div id="tooth-${num}">${toothSVG(num)}</div>
    </div>
  `).join('');
}

function selectTooth(num){
  selectedTooth=num;
  document.getElementById('selected-info').textContent=`Diente ${num} — Estado: ${teethState[num]||'sano'}`;
  document.getElementById('conditions-panel').style.display='flex';
}

function setCondition(condition){
  if(!selectedTooth)return;
  teethState[selectedTooth]=condition;
  document.getElementById('tooth-'+selectedTooth).innerHTML=toothSVG(selectedTooth);
  document.getElementById('selected-info').textContent=`Diente ${selectedTooth} → ${condition}`;
  saveToStorage();
}

function saveToStorage(){
  const params=new URLSearchParams(window.location.search);
  const patientId=params.get('patient');
  if(patientId)localStorage.setItem('odonto_'+patientId,JSON.stringify(teethState));
}

function loadFromStorage(){
  const params=new URLSearchParams(window.location.search);
  const patientId=params.get('patient');
  const name=params.get('name');
  if(name)document.getElementById('patient-name').textContent='👤 '+decodeURIComponent(name);
  if(patientId){
    const saved=localStorage.getItem('odonto_'+patientId);
    if(saved)teethState=JSON.parse(saved);
  }
}

loadFromStorage();
renderJaw([...upperRight,...upperLeft],'upper-jaw');
renderJaw([...lowerRight,...lowerLeft],'lower-jaw');
</script>
</body>
</html>
