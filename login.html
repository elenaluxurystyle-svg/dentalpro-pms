<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DentalPro — Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#F8FAFC;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.card{background:white;border-radius:24px;padding:40px;width:100%;max-width:400px;border:1px solid #E8EDF2;box-shadow:0 20px 60px rgba(15,23,42,.08)}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.logo-mark{width:44px;height:44px;background:linear-gradient(135deg,#1e90ff,#0047ab);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(27,79,216,.3)}
.logo-name{font-size:22px;font-weight:800;letter-spacing:-0.5px;color:#0a2463}
.logo-name span{color:#1e90ff}
.title{font-size:20px;font-weight:700;color:#0F172A;text-align:center;margin-bottom:6px;letter-spacing:-0.3px}
.subtitle{font-size:13px;color:#94A3B8;text-align:center;margin-bottom:28px}
.features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.feature{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#F8FAFC;border-radius:10px;border:1px solid #E8EDF2}
.feature-icon{font-size:16px}
.feature-text{font-size:12px;font-weight:600;color:#475569}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.divider-line{flex:1;height:1px;background:#E8EDF2}
.divider-text{font-size:11px;color:#94A3B8;font-weight:500}
#google-btn{display:flex;justify-content:center;margin-bottom:16px}
.error-msg{background:#FFF1F2;border:1px solid #FECDD3;color:#DC2626;padding:10px 14px;border-radius:8px;font-size:12px;font-weight:500;text-align:center;display:none;margin-bottom:12px}
.loading{display:none;text-align:center;padding:12px;font-size:13px;color:#64748b}
.terms{font-size:11px;color:#94A3B8;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 60 60" fill="none" style="width:24px;height:24px">
        <path d="M30 6C20 6 12 13 12 22C12 29 14 34 16 41C17 46 18 54 21 56C22 58 25 58 26 55C27 51 28 45 30 45C32 45 33 51 34 55C35 58 38 58 39 56C42 54 43 46 44 41C46 34 48 29 48 22C48 13 40 6 30 6Z" fill="white" opacity="0.95"/>
        <path d="M14 24Q30 19 46 24" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
      </svg>
    </div>
    <div class="logo-name">Dental<span>Pro</span></div>
  </div>
  <div class="title">Bienvenido de vuelta</div>
  <div class="subtitle">Sistema de Gestión Dental Profesional</div>
  <div class="features">
    <div class="feature"><span class="feature-icon">👤</span><span class="feature-text">Pacientes</span></div>
    <div class="feature"><span class="feature-icon">📅</span><span class="feature-text">Citas</span></div>
    <div class="feature"><span class="feature-icon">🦷</span><span class="feature-text">Odontograma</span></div>
    <div class="feature"><span class="feature-icon">📊</span><span class="feature-text">Analytics BI</span></div>
    <div class="feature"><span class="feature-icon">📦</span><span class="feature-text">Inventario</span></div>
    <div class="feature"><span class="feature-icon">💊</span><span class="feature-text">Recetas</span></div>
  </div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">Acceso seguro con Google</div>
    <div class="divider-line"></div>
  </div>
  <div id="error-msg" class="error-msg"></div>
  <div id="loading" class="loading">⏳ Verificando identidad...</div>
  <div id="google-btn"></div>
  <div class="terms">Al continuar aceptas los términos de uso de DentalPro.<br>Tus datos están protegidos y encriptados.</div>
</div>

<script>
const API = 'https://dentalpro-docker.onrender.com';

// Si ya está logueado redirigir
const _user = localStorage.getItem('dentalpro_user');
if (_user) window.location.href = 'index.html';

async function handleCredentialResponse(response) {
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('error-msg');
  const btn = document.getElementById('google-btn');
  loading.style.display = 'block';
  btn.style.display = 'none';
  errorMsg.style.display = 'none';

  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));

    // Verificar que el token tenga los campos necesarios
    if (!payload.email || !payload.name) throw new Error('Token incompleto');

    localStorage.setItem('dentalpro_user', JSON.stringify({
      name: payload.name,
      email: payload.email,
      picture: payload.picture,
      token: response.credential
    }));
    window.location.href = 'index.html';
  } catch(e) {
    loading.style.display = 'none';
    btn.style.display = 'flex';
    errorMsg.textContent = '❌ Error de autenticación: ' + e.message + '. Intenta de nuevo.';
    errorMsg.style.display = 'block';
  }
}

window.onload = function() {
  google.accounts.id.initialize({
    client_id: '113537762357-7u7b02i2lf3lnl6fsmaetud3nqelth0o.apps.googleusercontent.com',
    callback: handleCredentialResponse
  });
  google.accounts.id.renderButton(
    document.getElementById('google-btn'),
    {theme:'filled_blue', size:'large', text:'signin_with', width:320}
  );
};
</script>
</body>
</html>
