<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DentalPro — Iniciar sesión</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#1e293b;border-radius:24px;padding:40px;width:380px;border:1px solid #334155;text-align:center}
.logo{font-size:48px;margin-bottom:16px}
.title{font-size:24px;font-weight:700;color:#38bdf8;margin-bottom:8px}
.subtitle{font-size:14px;color:#64748b;margin-bottom:32px}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#475569;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#334155}
.features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px}
.feature{background:#0f172a;border-radius:10px;padding:12px;text-align:left}
.feature-icon{font-size:20px;margin-bottom:4px}
.feature-title{font-size:12px;font-weight:600;color:#cbd5e1}
.feature-desc{font-size:11px;color:#64748b}
#g_id_onload{display:none}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;background:white;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;color:#1f2937;transition:all .2s}
.google-btn:hover{background:#f3f4f6;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.google-icon{width:20px;height:20px}
.terms{font-size:11px;color:#475569;margin-top:16px}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🦷</div>
  <div class="title">DentalPro PMS</div>
  <div class="subtitle">Sistema de Gestión Dental Profesional</div>
  <div class="features">
    <div class="feature"><div class="feature-icon">👤</div><div class="feature-title">Pacientes</div><div class="feature-desc">Expedientes digitales</div></div>
    <div class="feature"><div class="feature-icon">📅</div><div class="feature-title">Citas</div><div class="feature-desc">Agenda inteligente</div></div>
    <div class="feature"><div class="feature-icon">🦷</div><div class="feature-title">Odontograma</div><div class="feature-desc">FDI interactivo</div></div>
    <div class="feature"><div class="feature-icon">📦</div><div class="feature-title">Inventario</div><div class="feature-desc">Control de stock</div></div>
  </div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continuar con Google
  </button>
  <div class="terms">Al continuar aceptas los términos de uso de DentalPro</div>
</div>
<script>
const CLIENT_ID = '113537762357-7u7b02i2lf3lnl6fsmaetud3nqelth0o.apps.googleusercontent.com';

function signInWithGoogle() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: 'email profile',
    callback: (response) => {
      if (response.access_token) {
        fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
          headers: { Authorization: 'Bearer ' + response.access_token }
        })
        .then(r => r.json())
        .then(user => {
          localStorage.setItem('dentalpro_user', JSON.stringify({
            name: user.name,
            email: user.email,
            picture: user.picture,
            token: response.access_token
          }));
          window.location.href = 'index.html';
        });
      }
    }
  });
  client.requestAccessToken();
}

// Si ya está logueado redirigir
const user = localStorage.getItem('dentalpro_user');
if (user) window.location.href = 'index.html';
</script>
</body>
</html>
